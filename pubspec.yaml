name: diacare
description: "DiaCare AI - Smart diabetes care and health monitoring app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  pdf: ^3.12.0
  printing: ^5.14.3
  image_picker: ^1.1.2
  firebase_core: ^3.1.1
  firebase_database: ^11.0.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  cloud_firestore: ^5.6.12
  package_info_plus: ^10.1.0
  path_provider: ^2.1.6


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/splashscreen/
    - assets/images/onboarding/

